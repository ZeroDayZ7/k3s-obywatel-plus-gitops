apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-auth
  template:
    metadata:
      labels:
        app: db-auth
    spec:
      containers:
        - name: database
          image: postgres:18.3-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: password
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-auth-pvc
