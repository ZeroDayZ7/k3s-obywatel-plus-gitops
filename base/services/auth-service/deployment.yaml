apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/zerodayz7/obywatel-auth
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth-secret
                  key: password
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_REFRESH_SECRET
            - name: INTERNAL_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HMAC_SECRET
            - name: INTERNAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_ENCRYPTION_KEY
            - name: INTERNAL_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HASH_SALT
          resources:
            limits:
              cpu: "300m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"
            # Sonda STARTOWA - daje czas na "rozkręcenie się" talerzy HDD i init bazy
            startupProbe:
              httpGet:
                path: /health
                port: 8082
              # Twój laptop potrzebuje czasu: 10 prób co 10 sekund = 100 sekund na start
              failureThreshold: 10
              periodSeconds: 10

            # Sonda ŻYCIA - ma być lekka. Jeśli to zawiedzie, K8s robi RESTART.
            livenessProbe:
              httpGet:
                path: /health # Docelowo zrób osobny endpoint /liveness bez checków!
                port: 8082
              initialDelaySeconds: 5 # StartupProbe już nas osłoniło, więc tu krótko
              periodSeconds: 30 # Nie męcz i3 zbyt często
              timeoutSeconds: 5
              failureThreshold: 3 # 3 błędy pod rząd = restart

            # Sonda GOTOWOŚCI - jeśli to zawiedzie, K8s odcina ruch od Poda (nie restartuje go!)
            readinessProbe:
              httpGet:
                path: /health
                port: 8082
              initialDelaySeconds: 5
              periodSeconds: 15 # Sprawdzaj upstreams co 15 sekund
              timeoutSeconds: 10 # Upstreamy mogą mulić na HDD, daj im czas
              failureThreshold: 3
