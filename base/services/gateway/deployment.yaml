apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/zerodayz7/obywatel-gateway
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_REFRESH_SECRET
            - name: INTERNAL_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HMAC_SECRET
            - name: INTERNAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_ENCRYPTION_KEY
            - name: INTERNAL_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HASH_SALT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth-secret
                  key: password
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
            # STARTUP - Kluczowy dla Twojego HDD
            # Dajemy mu aż 2 minuty na "rozruch" (12 prób x 10s)
            # Dopóki to nie przejdzie, Liveness i Readiness w ogóle nie startują.
            startupProbe:
              httpGet:
                path: /health
                port: 8081
              failureThreshold: 12
              periodSeconds: 10

            # LIVENESS - Tylko życie procesu
            # UWAGA: Ustawiamy wysoki próg błędu (failureThreshold),
            # żeby chwilowy "chrup" dysku HDD przy zapisywaniu logów nie zabił Gatewaya.
            livenessProbe:
              httpGet:
                path: /health # Idealnie byłoby /liveness, ale zostańmy przy tym co masz
                port: 8081
              initialDelaySeconds: 0 # StartupProbe już odczekał swoje
              periodSeconds: 45 # Sprawdzaj rzadko! Nie ma sensu częściej na tym procku.
              timeoutSeconds: 5 # 5 sekund to świat i ludzie na odpowiedź procesu
              failureThreshold: 5 # Musi paść 5 razy pod rząd (czyli przez ~4 minuty), żeby go ubić

            # READINESS - Gotowość na ruch
            # To wyłącza ruch z Ingressa do Gatewaya, jeśli np. Auth-Service leży.
            readinessProbe:
              httpGet:
                path: /health
                port: 8081
              initialDelaySeconds: 5
              periodSeconds: 20 # To musi być częściej niż liveness, żeby szybko odpiąć usera od błędów
              timeoutSeconds: 10 # Dajemy 10s, bo check upstreams (auth, redis) może trwać
              failureThreshold: 3
