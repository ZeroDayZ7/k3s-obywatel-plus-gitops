apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: zerodayz7/obywatel-gateway:placeholder
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_REFRESH_SECRET
            - name: INTERNAL_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HMAC_SECRET
            - name: INTERNAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_ENCRYPTION_KEY
            - name: INTERNAL_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: INTERNAL_HASH_SALT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: REDIS_PASSWORD
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
