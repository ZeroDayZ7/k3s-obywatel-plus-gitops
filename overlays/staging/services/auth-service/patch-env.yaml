# overlays\staging\services\auth\patch-env.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  template:
    spec:
      containers:
        - name: auth-service
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            - name: ENVIRONMENT
              value: "staging"
            - name: DEBUG
              value: "true"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
