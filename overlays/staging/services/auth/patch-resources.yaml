apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  template:
    spec:
      containers:
        - name: auth-service
          resources:
            limits:
              cpu: "150m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
