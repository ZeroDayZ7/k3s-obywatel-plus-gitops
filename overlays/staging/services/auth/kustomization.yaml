# overlays/staging/services/auth-service/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/infra/auth-service

patches:
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: auth-service
  - path: patch-env.yaml
    target:
      kind: Deployment
      name: auth-service
