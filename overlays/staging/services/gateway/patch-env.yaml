# overlays\staging\services\gateway\patch-env.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          envFrom:
            - configMapRef:
                name: gateway-config
          env:
            - name: ENVIRONMENT
              value: "staging"
            - name: DEBUG
              value: "true"
            - name: AUTH_SERVICE_ADDR
              value: "http://auth-service"
